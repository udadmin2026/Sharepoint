<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>United Dredging — Sign In</title>
  <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1C1D2E; font-family: -apple-system, sans-serif; color: #F5F6FA;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: rgba(35,45,99,0.5); border: 1px solid rgba(245,246,250,0.12);
      border-radius: 14px; padding: 40px 36px; max-width: 380px; width: 100%; text-align: center; }
    .logo { font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(245,246,250,0.4); margin-bottom: 28px; }
    .logo strong { display: block; font-size: 22px; font-weight: 800; color: #F5F6FA;
      letter-spacing: 1px; margin-bottom: 4px; }
    .status { font-size: 14px; color: rgba(245,246,250,0.65); line-height: 1.6; margin-bottom: 20px; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(245,246,250,0.15);
      border-top-color: #DA0039; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn { background: #DA0039; color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; padding: 12px 28px; cursor: pointer; width: 100%; }
    .btn:hover { background: #b8002f; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .check { color: #00C875; font-size: 36px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><strong>United Dredging</strong>SharePoint Widgets</div>
  <div id="spinner" class="spinner"></div>
  <div id="status" class="status">Checking your Microsoft session…</div>
  <button id="signInBtn" class="btn" style="display:none">Sign in with Microsoft</button>
</div>
<script>
const CLIENT   = '69affe29-c1bc-4e7a-89f6-583211c1d3f2';
const TENANT   = 'f0c675e2-30ad-41ca-9424-b4eac122977b';
const REDIRECT = 'https://udadmin2026.github.io/Sharepoint/auth/';
const SCOPES   = ['https://jddredging.sharepoint.com/AllSites.Read'];

// returnTo is the SharePoint page URL we came from — we'll go back there after auth
const params   = new URLSearchParams(window.location.search);
const returnTo = params.get('returnTo') || 'https://jddredging.sharepoint.com/sites/Dredging/SitePages/Y171.aspx';

const cfg = {
  auth: { clientId: CLIENT, authority: 'https://login.microsoftonline.com/' + TENANT, redirectUri: REDIRECT },
  cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
};

function showSuccess() {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('status').innerHTML = '<div class="check">✓</div>Signed in! Returning to SharePoint…';
  // Redirect back to SharePoint — full page load means MSAL finds token in localStorage
  setTimeout(() => { window.location.href = returnTo; }, 1200);
}

async function run() {
  const app = new window.msal.PublicClientApplication(cfg);
  await app.initialize();

  // Handle redirect response — this fires when Microsoft redirects back here after login
  try {
    const result = await app.handleRedirectPromise();
    if (result && result.accessToken) {
      showSuccess();
      return;
    }
  } catch(e) { console.warn('handleRedirectPromise:', e.message); }

  // Try silent with existing cached account
  const accounts = app.getAllAccounts();
  if (accounts.length > 0) {
    try {
      await app.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
      showSuccess();
      return;
    } catch(e) {}
  }

  // Try ssoSilent (reuse M365 session)
  try {
    await app.ssoSilent({ scopes: SCOPES });
    showSuccess();
    return;
  } catch(e) {}

  // Need interactive — show button
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('status').textContent = 'Sign in with your Microsoft account to access Project Status data.';
  const btn = document.getElementById('signInBtn');
  btn.style.display = 'block';
  btn.addEventListener('click', () => {
    btn.disabled = true;
    btn.textContent = 'Redirecting…';
    document.getElementById('spinner').style.display = 'block';
    // Store returnTo in localStorage so we can use it after the redirect chain completes
    localStorage.setItem('ud_auth_returnTo', returnTo);
    app.loginRedirect({ scopes: SCOPES });
  });

  // After loginRedirect, Microsoft sends browser back here.
  // handleRedirectPromise (above) catches that and calls showSuccess() → returnTo.
  // BUT if returnTo was lost, recover it from localStorage:
  const storedReturn = localStorage.getItem('ud_auth_returnTo');
  if (storedReturn && storedReturn !== returnTo) {
    // We're in the post-redirect case with a stored URL
    // handleRedirectPromise already handled it above if token was present
  }
}

run();
</script>
</body>
</html>
