<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>United Dredging — Sign In</title>
  <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1C1D2E; font-family: -apple-system, sans-serif; color: #F5F6FA;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: rgba(35,45,99,0.5); border: 1px solid rgba(245,246,250,0.12);
      border-radius: 14px; padding: 40px 36px; max-width: 380px; width: 100%; text-align: center; }
    .logo { font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(245,246,250,0.4); margin-bottom: 28px; }
    .logo strong { display: block; font-size: 22px; font-weight: 800; color: #F5F6FA;
      letter-spacing: 1px; margin-bottom: 4px; }
    .status { font-size: 14px; color: rgba(245,246,250,0.65); line-height: 1.6; margin-bottom: 20px; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(245,246,250,0.15);
      border-top-color: #DA0039; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn { background: #DA0039; color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; padding: 12px 28px; cursor: pointer; width: 100%; }
    .btn:hover { background: #b8002f; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .check { color: #00C875; font-size: 36px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><strong>United Dredging</strong>SharePoint Widgets</div>
  <div id="spinner" class="spinner"></div>
  <div id="status" class="status">Checking your Microsoft session…</div>
  <button id="signInBtn" class="btn" style="display:none">Sign in with Microsoft</button>
</div>
<script>
const CLIENT   = '69affe29-c1bc-4e7a-89f6-583211c1d3f2';
const TENANT   = 'f0c675e2-30ad-41ca-9424-b4eac122977b';
const REDIRECT = 'https://udadmin2026.github.io/Sharepoint/auth/';
const SCOPES   = ['https://jddredging.sharepoint.com/AllSites.Read'];

const params   = new URLSearchParams(window.location.search);
const returnTo = params.get('returnTo')
  || localStorage.getItem('ud_auth_returnTo')
  || 'https://jddredging.sharepoint.com/sites/Dredging/SitePages/Y171.aspx';

// Which widget page sent us here (so we can pass token back via hash)
const widgetUrl = params.get('widget')
  || localStorage.getItem('ud_auth_widget')
  || 'https://udadmin2026.github.io/Sharepoint/y171/';

const cfg = {
  auth: { clientId: CLIENT, authority: 'https://login.microsoftonline.com/' + TENANT, redirectUri: REDIRECT },
  cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
};

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// Detect if we were opened as a popup by the widget
const isPopup = params.get('popup') === '1' || (window.opener && window.opener !== window);

function deliverToken(accessToken, expiresOn) {
  const expiry = expiresOn ? new Date(expiresOn).getTime() : Date.now() + 3600000;
  const tokenData = JSON.stringify({ token: accessToken, expiry: expiry });

  // Always write to localStorage as a fallback for mobile redirect flow
  // (mobile SP app can read this after redirect since tracking prevention
  //  is less aggressive in mobile browsers for same-origin iframes)
  try { localStorage.setItem('ud_sp_token_y171', tokenData); } catch(e) {}

  document.getElementById('spinner').style.display = 'none';
  document.getElementById('status').innerHTML = '<div class="check">✓</div>Signed in!';

  localStorage.removeItem('ud_auth_returnTo');
  localStorage.removeItem('ud_auth_widget');

  if (isPopup && window.opener) {
    // Popup mode — postMessage token back to widget iframe, then close
    try {
      window.opener.postMessage(
        { type: 'ud_token', token: accessToken, expiry: expiry },
        'https://udadmin2026.github.io'
      );
    } catch(e) {}
    setTimeout(() => window.close(), 500);
  } else {
    // Redirect mode (mobile) — navigate back to SharePoint
    // Widget will find token in localStorage on reload
    setTimeout(() => { window.location.href = returnTo; }, 800);
  }
}

async function run() {
  const app = new window.msal.PublicClientApplication(cfg);
  await app.initialize();

  // Handle redirect from Microsoft
  try {
    const result = await app.handleRedirectPromise();
    if (result && result.accessToken) {
      deliverToken(result.accessToken, result.expiresOn);
      return;
    }
  } catch(e) { console.warn('handleRedirectPromise:', e.message); }

  // Try silent with cached account
  const accounts = app.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const r = await app.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
      deliverToken(r.accessToken, r.expiresOn);
      return;
    } catch(e) {}
  }

  // Try ssoSilent (works top-level)
  try {
    setStatus('Checking Microsoft session…');
    const r = await app.ssoSilent({ scopes: SCOPES });
    deliverToken(r.accessToken, r.expiresOn);
    return;
  } catch(e) {}

  // Need interactive login
  document.getElementById('spinner').style.display = 'none';
  setStatus('Sign in with your Microsoft account to access live project data.');
  const btn = document.getElementById('signInBtn');
  btn.style.display = 'block';
  btn.addEventListener('click', () => {
    btn.disabled = true;
    btn.textContent = 'Redirecting to Microsoft…';
    document.getElementById('spinner').style.display = 'block';
    localStorage.setItem('ud_auth_returnTo', returnTo);
    localStorage.setItem('ud_auth_widget', widgetUrl);
    app.loginRedirect({ scopes: SCOPES });
  });
}

run();
</script>
</body>
</html>
