<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Y171 — Project Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- MSAL — Microsoft's official auth library for browser apps -->
  <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #1C1D2E;
      --blue:    #232D63;
      --red:     #DA0039;
      --green:   #00C875;
      --amber:   #FFAB00;
      --white:   #F5F6FA;
      --muted:   rgba(245,246,250,0.55);
      --card-bg: rgba(35,45,99,0.45);
      --border:  rgba(245,246,250,0.12);
    }
    html, body { min-height: 100%; background: var(--navy); font-family: 'Barlow', sans-serif; color: var(--white); }
    body {
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(35,45,99,0.6) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(218,0,57,0.08) 0%, transparent 55%),
        var(--navy);
      padding: 24px 20px 36px;
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .unit-badge { background: var(--red); font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 1px; padding: 6px 14px 5px; border-radius: 6px; line-height: 1; text-transform: uppercase; }
    .header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 0.5px; line-height: 1.1; }
    .header-title span { display: block; font-size: 12px; font-weight: 400; font-family: 'Barlow', sans-serif; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .refresh-info { font-size: 11px; color: var(--muted); text-align: right; }
    .refresh-info strong { display: block; font-size: 12px; color: rgba(245,246,250,0.75); }
    .btn { background: var(--blue); border: 1px solid var(--border); color: var(--white); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 7px 16px; border-radius: 6px; cursor: pointer; transition: background 0.18s, transform 0.1s; white-space: nowrap; }
    .btn:hover { background: #2d3a80; }
    .btn:active { transform: scale(0.97); }
    .btn.loading { opacity: 0.6; pointer-events: none; }
    .btn-signin { background: var(--red); border-color: rgba(218,0,57,0.5); font-size: 14px; padding: 10px 24px; }
    .btn-signin:hover { background: #b8002f; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
    .status-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; backdrop-filter: blur(12px); overflow: hidden; display: flex; flex-direction: column; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 12px; border-bottom: 1px solid var(--border); }
    .status-pill { display: flex; align-items: center; gap: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 1.2px; text-transform: uppercase; }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .card--active .status-dot  { background: var(--green); animation: pg 2s infinite; }
    .card--mobil  .status-dot  { background: var(--amber); animation: pa 2s infinite; }
    .card--active .card-header { border-left: 3px solid var(--green); }
    .card--mobil  .card-header { border-left: 3px solid var(--amber); }
    .card--active .status-pill { color: var(--green); }
    .card--mobil  .status-pill { color: var(--amber); }
    @keyframes pg { 0%,100%{box-shadow:0 0 6px var(--green);} 50%{box-shadow:0 0 14px var(--green),0 0 24px rgba(0,200,117,.3);} }
    @keyframes pa { 0%,100%{box-shadow:0 0 6px var(--amber);} 50%{box-shadow:0 0 14px var(--amber),0 0 24px rgba(255,171,0,.3);} }
    .count-badge { background: rgba(245,246,250,0.1); border: 1px solid var(--border); border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; padding: 2px 10px; color: var(--muted); }
    .card-body { flex: 1; display: flex; flex-direction: column; }
    .project-row { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 2px 14px; padding: 14px 18px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .project-row:last-child { border-bottom: none; }
    .project-row:hover { background: rgba(245,246,250,0.04); }
    .field-label { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
    .field-value { font-size: 13px; font-weight: 600; color: var(--white); line-height: 1.3; }
    .field-value.tonnage { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; }
    .card--active .field-value.tonnage { color: var(--green); }
    .card--mobil  .field-value.tonnage { color: var(--amber); }
    .cell-customer { grid-column: 1; grid-row: 1; }
    .cell-location { grid-column: 2; grid-row: 1; }
    .cell-product  { grid-column: 1; grid-row: 2; padding-top: 10px; }
    .cell-tonnage  { grid-column: 2; grid-row: 2; padding-top: 10px; }
    .card-state { padding: 30px 18px; text-align: center; color: var(--muted); font-size: 13px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    .card-error-box { margin: 12px 14px; background: rgba(218,0,57,0.12); border: 1px solid rgba(218,0,57,0.35); border-radius: 8px; padding: 14px; font-size: 12px; color: #ff8fa3; line-height: 1.7; }
    .card-error-box strong { display: block; font-size: 13px; margin-bottom: 6px; color: #ff6b8a; }
    .signin-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 40px 20px; text-align: center; min-height: 200px; }
    .signin-box p { color: var(--muted); font-size: 13px; max-width: 320px; line-height: 1.6; }
    .footer { margin-top: 18px; font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .spinner { width: 22px; height: 22px; border: 3px solid rgba(245,246,250,0.15); border-top-color: rgba(245,246,250,0.6); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="unit-badge">Y171</div>
    <div class="header-title">
      Project Status
      <span>United Dredging — Live from SharePoint</span>
    </div>
  </div>
  <div class="header-right">
    <div class="refresh-info">
      <strong id="lastUpdated">Loading…</strong>
      Auto-refresh every 2 min
    </div>
    <button class="btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="cards-grid">
  <div class="status-card card--active">
    <div class="card-header">
      <div class="status-pill"><div class="status-dot"></div>Active</div>
      <div class="count-badge" id="activeCount">—</div>
    </div>
    <div class="card-body" id="activeBody">
      <div class="card-state"><div class="spinner"></div><span>Connecting…</span></div>
    </div>
  </div>
  <div class="status-card card--mobil">
    <div class="card-header">
      <div class="status-pill"><div class="status-dot"></div>Mobilization Scheduled</div>
      <div class="count-badge" id="mobilCount">—</div>
    </div>
    <div class="card-body" id="mobilBody">
      <div class="card-state"><div class="spinner"></div><span>Connecting…</span></div>
    </div>
  </div>
</div>

<div class="footer">
  <div>Source: <strong>Project List</strong> · Machine = Y171 · UnitedDredging</div>
  <div id="statusLine"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURATION
// Update CLIENT_ID after registering the app in Azure AD
// (see instructions below)
// ═══════════════════════════════════════════════════════════
const CLIENT_ID  = '69affe29-c1bc-4e7a-89f6-583211c1d3f2';
const TENANT_ID  = 'f0c675e2-30ad-41ca-9424-b4eac122977b';
const SITE_URL   = 'https://jddredging.sharepoint.com/sites/UnitedDredging';
const LIST_NAME  = 'Project List';
const MACHINE    = 'Y171';

const COLS = {
  machine:  'PossibleMachine',
  status:   'Status',
  customer: 'Customer_x002f_Company',
  location: 'ProjectLocation_x0028_PitName_x0',
  product:  'Product_x002f_Work',
  tonnage:  'Requested_x0020_Dredge_x0020_amo',
};

const REFRESH_MS = 2 * 60 * 1000;
let timer = null;
let msalInstance = null;
let accessToken  = null;

// ── MSAL SETUP ────────────────────────────────────────────
const msalConfig = {
  auth: {
    clientId:   CLIENT_ID,
    authority:  `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: window.location.href.split('?')[0],
  },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
};

const loginRequest = {
  scopes: [`https://jddredging.sharepoint.com/AllSites.Read`]
};

// ── RENDER ────────────────────────────────────────────────
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const val = v => (v !== null && v !== undefined && String(v).trim()) ? esc(String(v).trim()) : '—';
const ton = raw => {
  if (raw === null || raw === undefined || raw === '') return '—';
  const n = parseFloat(String(raw).replace(/,/g,''));
  return isNaN(n) ? esc(String(raw)) : n.toLocaleString('en-US') + ' T';
};

function renderRows(items) {
  if (!items.length) return `<div class="card-state" style="font-style:italic">No Y171 projects found</div>`;
  return items.map(item => `
    <div class="project-row">
      <div class="cell-customer"><div class="field-label">Customer / Company</div><div class="field-value">${val(item[COLS.customer])}</div></div>
      <div class="cell-location"><div class="field-label">Project Location</div><div class="field-value">${val(item[COLS.location])}</div></div>
      <div class="cell-product"><div class="field-label">Product / Work</div><div class="field-value">${val(item[COLS.product])}</div></div>
      <div class="cell-tonnage"><div class="field-label">Contracted Tonnage</div><div class="field-value tonnage">${ton(item[COLS.tonnage])}</div></div>
    </div>`).join('');
}

function setCards(activeItems, mobilItems) {
  document.getElementById('activeBody').innerHTML   = renderRows(activeItems);
  document.getElementById('activeCount').textContent = activeItems.length;
  document.getElementById('mobilBody').innerHTML    = renderRows(mobilItems);
  document.getElementById('mobilCount').textContent  = mobilItems.length;
  const t = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('lastUpdated').textContent = 'Updated ' + t;
  document.getElementById('statusLine').textContent  = 'Authenticated · ' + t;
  document.getElementById('refreshBtn').classList.remove('loading');
  document.getElementById('refreshBtn').textContent = '↻ Refresh';
  clearTimeout(timer);
  timer = setTimeout(loadData, REFRESH_MS);
}

function showSignIn() {
  const html = `
    <div class="signin-box">
      <p>Sign in with your Microsoft account to load live project data.</p>
      <button class="btn btn-signin" onclick="signIn()">🔐 Sign in with Microsoft</button>
    </div>`;
  document.getElementById('activeBody').innerHTML = html;
  document.getElementById('mobilBody').innerHTML  = `<div class="card-state" style="color:var(--muted);font-style:italic">Sign in to load data</div>`;
  document.getElementById('refreshBtn').classList.remove('loading');
  document.getElementById('refreshBtn').textContent = '↻ Refresh';
  document.getElementById('lastUpdated').textContent = 'Not signed in';
}

function showError(msg) {
  const html = `<div class="card-error-box"><strong>⚠ Error</strong>${msg}</div>`;
  document.getElementById('activeBody').innerHTML = html;
  document.getElementById('mobilBody').innerHTML  = html;
  document.getElementById('refreshBtn').classList.remove('loading');
  document.getElementById('refreshBtn').textContent = '↻ Retry';
}

// ── AUTH ──────────────────────────────────────────────────
async function signIn() {
  try {
    const result = await msalInstance.loginPopup(loginRequest);
    accessToken = result.accessToken;
    loadData();
  } catch(e) {
    console.error('[Y171] Sign in failed:', e);
    showError(`Sign in failed: ${e.message}`);
  }
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) return null;
  try {
    const result = await msalInstance.acquireTokenSilent({ ...loginRequest, account: accounts[0] });
    return result.accessToken;
  } catch(e) {
    // Silent failed — try popup
    try {
      const result = await msalInstance.acquireTokenPopup({ ...loginRequest, account: accounts[0] });
      return result.accessToken;
    } catch(e2) {
      return null;
    }
  }
}

// ── DATA FETCH ────────────────────────────────────────────
async function fetchByStatus(token, status) {
  const select = ['Id', COLS.customer, COLS.location, COLS.product, COLS.tonnage].join(',');
  const filter  = `${COLS.machine} eq '${MACHINE}' and ${COLS.status} eq '${status}'`;
  const url = `${SITE_URL}/_api/web/lists/getbytitle('${encodeURIComponent(LIST_NAME)}')/items`
            + `?$select=${select}&$filter=${encodeURIComponent(filter)}&$orderby=Id desc&$top=50`;

  const r = await fetch(url, {
    headers: {
      'Accept': 'application/json;odata=verbose',
      'Authorization': `Bearer ${token}`
    }
  });
  if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
  return (await r.json())?.d?.results ?? [];
}

async function loadData() {
  document.getElementById('refreshBtn').classList.add('loading');
  document.getElementById('refreshBtn').textContent = '↻ Loading…';

  // Check config
  if (CLIENT_ID === 'YOUR_APP_CLIENT_ID') {
    showError(`Azure AD App not configured yet. See setup instructions in the page source (search for SETUP INSTRUCTIONS).`);
    return;
  }

  const token = await getToken();
  if (!token) { showSignIn(); return; }

  try {
    const [activeItems, mobilItems] = await Promise.all([
      fetchByStatus(token, 'Active'),
      fetchByStatus(token, 'Mobilization Scheduled')
    ]);
    setCards(activeItems, mobilItems);
  } catch(err) {
    console.error('[Y171]', err);
    showError(`${err.message} — check column names in COLS config.`);
  }
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  if (CLIENT_ID === 'YOUR_APP_CLIENT_ID') {
    showError(`
      <strong style="color:#ffab00">⚙ One-time setup required</strong>
      This widget needs a free Azure AD app registration to authenticate with SharePoint.
      <br><br>
      <strong>Steps (5 minutes):</strong><br>
      1. Go to <a href="https://portal.azure.com/#blade/Microsoft_AAD_RegisteredApps/ApplicationsListBlade" target="_blank" style="color:#a8d8ff">portal.azure.com → App registrations</a><br>
      2. Click <strong>New registration</strong><br>
      3. Name: <code>Y171 Status Widget</code><br>
      4. Supported account types: <strong>Single tenant</strong><br>
      5. Redirect URI: <strong>Single-page application (SPA)</strong> → paste your GitHub Pages URL:<br>
      <code>https://udadmin2026.github.io/Sharepoint/y171/</code><br>
      6. Click <strong>Register</strong><br>
      7. Copy the <strong>Application (client) ID</strong> and <strong>Directory (tenant) ID</strong><br>
      8. Go to <strong>API permissions → Add → SharePoint → Delegated → AllSites.Read</strong> → Grant admin consent<br>
      9. Paste both IDs into the <code>CLIENT_ID</code> and <code>TENANT_ID</code> constants at the top of this file
    `);
    return;
  }

  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();

  // Handle redirect response
  try { await msalInstance.handleRedirectPromise(); } catch(e) {}

  loadData();
}

init();
</script>
</body>
</html>
